<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>SmartDay Dashboard 🚀</h1>
<button onclick="logout()">Logout</button>

<div class="input-box">
  <input type="text" id="taskTitle" placeholder="Task">
  <input type="date" id="deadline">
  <input type="number" id="importance" min="1" max="5">
  <button onclick="addTask()">Add</button>
</div>

<h2>🔥 Next Task: <span id="suggestion">None</span></h2>

<div class="board">
  <div class="column" id="q1"><h3>Do Now</h3></div>
  <div class="column" id="q2"><h3>Schedule</h3></div>
  <div class="column" id="q3"><h3>Delegate</h3></div>
  <div class="column" id="q4"><h3>Ignore</h3></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>

</body>
</html>
